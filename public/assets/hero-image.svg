<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#skyGrad)"/>
  <!-- Mountains background -->
  <path d="M0 350 L120 180 L200 280 L300 150 L420 300 L500 200 L600 280 L700 170 L800 300 L800 500 L0 500 Z" fill="#cbd5e1" opacity="0.5"/>
  <path d="M0 400 L150 250 L280 350 L400 220 L520 330 L650 240 L800 360 L800 500 L0 500 Z" fill="#94a3b8" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="380" width="800" height="120" fill="#86efac" opacity="0.3"/>
  <!-- House body -->
  <rect x="250" y="260" width="300" height="140" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Roof -->
  <path d="M230 265 L400 150 L570 265 Z" fill="url(#houseGrad)"/>
  <!-- Chimney -->
  <rect x="480" y="175" width="30" height="60" fill="#64748b"/>
  <!-- Door -->
  <rect x="370" y="320" width="60" height="80" rx="4" fill="url(#houseGrad)"/>
  <circle cx="420" cy="365" r="4" fill="#f59e0b"/>
  <!-- Windows -->
  <rect x="280" y="290" width="55" height="45" rx="3" fill="#bfdbfe" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="307.5" y1="290" x2="307.5" y2="335" stroke="#94a3b8" stroke-width="1"/>
  <line x1="280" y1="312.5" x2="335" y2="312.5" stroke="#94a3b8" stroke-width="1"/>
  <rect x="465" y="290" width="55" height="45" rx="3" fill="#bfdbfe" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="492.5" y1="290" x2="492.5" y2="335" stroke="#94a3b8" stroke-width="1"/>
  <line x1="465" y1="312.5" x2="520" y2="312.5" stroke="#94a3b8" stroke-width="1"/>
  <!-- Garage -->
  <rect x="560" y="310" width="100" height="90" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="570" y="320" width="80" height="70" rx="2" fill="#e2e8f0"/>
  <line x1="570" y1="345" x2="650" y2="345" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="570" y1="370" x2="650" y2="370" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Trees -->
  <rect x="155" y="330" width="12" height="70" fill="#92400e"/>
  <circle cx="161" cy="310" r="35" fill="#22c55e" opacity="0.7"/>
  <circle cx="148" cy="320" r="25" fill="#16a34a" opacity="0.7"/>
  <rect x="680" y="340" width="10" height="60" fill="#92400e"/>
  <circle cx="685" cy="320" r="30" fill="#22c55e" opacity="0.7"/>
  <circle cx="698" cy="330" r="22" fill="#16a34a" opacity="0.7"/>
  <!-- Driveway -->
  <path d="M370 400 L340 500 L460 500 L430 400 Z" fill="#d1d5db" opacity="0.5"/>
  <!-- Sun -->
  <circle cx="680" cy="80" r="40" fill="#fbbf24" opacity="0.8"/>
  <!-- Clouds -->
  <g opacity="0.6">
    <circle cx="120" cy="80" r="25" fill="white"/>
    <circle cx="150" cy="70" r="30" fill="white"/>
    <circle cx="180" cy="80" r="25" fill="white"/>
  </g>
  <g opacity="0.4">
    <circle cx="450" cy="60" r="20" fill="white"/>
    <circle cx="475" cy="52" r="25" fill="white"/>
    <circle cx="500" cy="60" r="20" fill="white"/>
  </g>
</svg>

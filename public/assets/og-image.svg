<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ogGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogGrad)"/>
  <!-- Subtle pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>
  <!-- Mountain silhouette -->
  <path d="M0 500 L200 320 L350 420 L500 280 L650 400 L800 300 L950 420 L1050 340 L1200 460 L1200 630 L0 630 Z" fill="white" opacity="0.05"/>
  <!-- Logo mark -->
  <g transform="translate(460, 160)">
    <path d="M60 120 L120 30 L160 80 L200 30 L260 120 Z" fill="#f59e0b" opacity="0.9"/>
    <path d="M130 120 L130 90 L190 90 L190 120" fill="#1e3a5f"/>
    <rect x="150" y="100" width="20" height="20" fill="#f59e0b" opacity="0.7"/>
  </g>
  <!-- Company name -->
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">SUMMIT PRO BUILDERS</text>
  <!-- Tagline -->
  <text x="600" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#93c5fd" text-anchor="middle" letter-spacing="3">DENVER'S TRUSTED GENERAL CONTRACTOR</text>
  <!-- Divider -->
  <line x1="450" y1="440" x2="750" y2="440" stroke="#f59e0b" stroke-width="3"/>
  <!-- Contact -->
  <text x="600" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">(720) 555-0193 | summitprobuilders.com</text>
  <!-- Bottom accent -->
  <rect x="0" y="610" width="1200" height="20" fill="#f59e0b"/>
</svg>
